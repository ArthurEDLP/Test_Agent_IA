<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent IA — Lecture de Documents</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00ff99;
      --accent-dim: rgba(0,255,153,0.08);
      --text: #e8e8e8;
      --text-dim: #666;
      --user-bg: #1a1a1a;
      --agent-bg: #111;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* HEADER */
    header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }

    header span {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* CHAT AREA */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message .label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .message.user .label { color: var(--accent); }

    .message .bubble {
      padding: 14px 18px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 300;
      border: 1px solid var(--border);
      background: var(--agent-bg);
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-color: #333;
    }

    .message.agent .bubble {
      border-left: 2px solid var(--accent);
    }

    /* TYPING INDICATOR */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 16px 18px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* INPUT AREA */
    footer {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 300;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-dim); }

    #send {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 12px 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
      height: 44px;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #send:hover { opacity: 0.85; }
    #send:active { transform: scale(0.97); }
    #send:disabled { opacity: 0.3; cursor: not-allowed; }

    /* MATRIX CANVAS */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.4;
    }

    /* EMPTY STATE */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dim);
    }

    .empty-icon {
      font-family: var(--font-mono);
      font-size: 28px;
      color: var(--border);
    }

    .empty p {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="dot"></div>
      <h1>Bienvenue dans la Matrice</h1>
      <span>localhost:5000</span>
    </header>

    <div id="chat">
      <div class="empty" id="empty">
        <div class="empty-icon">⌘</div>
        <p>Pose une question sur tes documents, <br> </br> la Matrice te répondra</p>
      </div>
    </div>

    <footer>
      <textarea id="input" placeholder="Ta recherche de vérité..." rows="1"></textarea>
      <button id="send">Demander à l'oracle</button>
    </footer>

  </div>

  <canvas id="matrix"></canvas>

  <script>
    // MATRIX RAIN
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");
    const container = document.querySelector(".container");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノ";
    const fontSize = 13;
    let columns = Math.floor(window.innerWidth / fontSize);
    let drops = Array(columns).fill(1);

    function drawMatrix() {
      // Zone centrale à éviter (là où est le chat)
      const containerLeft = (window.innerWidth - 720) / 2;
      const containerRight = containerLeft + 720;

      ctx.fillStyle = "rgba(14, 14, 14, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#00ff99";
      ctx.font = `${fontSize}px IBM Plex Mono`;

      columns = Math.floor(window.innerWidth / fontSize);
      if (drops.length !== columns) drops = Array(columns).fill(1);

      for (let i = 0; i < drops.length; i++) {
        const x = i * fontSize;

        // Ne dessine que dans les zones gauche et droite du chat
        if (x > containerLeft - 10 && x < containerRight + 10) continue;

        const char = chars[Math.floor(Math.random() * chars.length)];

        // Première colonne plus lumineuse
        ctx.fillStyle = Math.random() > 0.95 ? "#ffffff" : "#00ff99";
        ctx.fillText(char, x, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 45);
  </script>

  <script>
    const chat   = document.getElementById("chat");
    const input  = document.getElementById("input");
    const send   = document.getElementById("send");
    const empty  = document.getElementById("empty");

    const API_URL = "http://localhost:5000/ask";

    // Auto-resize textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 140) + "px";
    });

    // Envoyer avec Entrée (Shift+Entrée pour nouvelle ligne)
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        envoyer();
      }
    });

    send.addEventListener("click", envoyer);

    function ajouterMessage(role, texte) {
      if (empty) empty.style.display = "none";

      const msg = document.createElement("div");
      msg.className = `message ${role}`;
      msg.innerHTML = `
        <div class="label">${role === "user" ? "Vous" : "Agent"}</div>
        <div class="bubble">${texte}</div>
      `;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    function ajouterTyping() {
      const msg = document.createElement("div");
      msg.className = "message agent typing";
      msg.innerHTML = `
        <div class="label">Agent</div>
        <div class="bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    async function envoyer() {
      const question = input.value.trim();
      if (!question) return;

      // Affiche la question
      ajouterMessage("user", question);
      input.value = "";
      input.style.height = "auto";
      send.disabled = true;

      // Affiche l'indicateur de chargement
      const typing = ajouterTyping();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const data = await res.json();
        typing.remove();
        ajouterMessage("agent", data.reponse);

      } catch (err) {
        typing.remove();
        ajouterMessage("agent", "Erreur : impossible de contacter le serveur. Vérifie que Flask tourne sur le port 5000.");
      }

      send.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
